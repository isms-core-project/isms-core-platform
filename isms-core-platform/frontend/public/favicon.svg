<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0d3a7a"/>
      <stop offset="100%" stop-color="#001f4d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#5b9bd5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#001f4d" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <path d="M16 1.5 L29.5 7 L29.5 18 C29.5 25.5 23.5 30.5 16 32 C8.5 30.5 2.5 25.5 2.5 18 L2.5 7 Z"/>
    </clipPath>
  </defs>

  <!-- Shield body -->
  <path d="M16 1.5 L29.5 7 L29.5 18 C29.5 25.5 23.5 30.5 16 32 C8.5 30.5 2.5 25.5 2.5 18 L2.5 7 Z"
        fill="url(#shield)"/>

  <!-- Inner glow -->
  <rect x="0" y="0" width="32" height="32" fill="url(#glow)" clip-path="url(#clip)"/>

  <!-- Shield edge highlight -->
  <path d="M16 1.5 L29.5 7 L29.5 18 C29.5 25.5 23.5 30.5 16 32 C8.5 30.5 2.5 25.5 2.5 18 L2.5 7 Z"
        fill="none" stroke="#2d6abf" stroke-width="1"/>

  <!-- Outer orbit ring -->
  <circle cx="16" cy="18" r="9.5" fill="none" stroke="#2d6abf" stroke-width="0.8" stroke-opacity="0.6"
          clip-path="url(#clip)"/>

  <!-- Mid ring -->
  <circle cx="16" cy="18" r="6.2" fill="none" stroke="#4472C4" stroke-width="1.2"
          clip-path="url(#clip)"/>

  <!-- Cardinal ticks on mid ring -->
  <line x1="16" y1="11" x2="16" y2="12.8" stroke="#4472C4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="23.2" x2="16" y2="25" stroke="#4472C4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="18" x2="10.8" y2="18" stroke="#4472C4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="21.2" y1="18" x2="23" y2="18" stroke="#4472C4" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Core filled circle -->
  <circle cx="16" cy="18" r="3.2" fill="#3366bb"/>

  <!-- Hot centre -->
  <circle cx="16" cy="18" r="1.4" fill="#e8f0ff"/>

  <!-- Top-left sheen -->
  <path d="M7 9 C9 5.5 12.5 3 16 2.5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.8"
        stroke-linecap="round"/>
</svg>
