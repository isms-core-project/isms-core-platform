# ============================================================================
# ISMS CORE Platform — Production Compose
#
# TLS (A.8.24 compliance):
#   Default:      self-signed cert auto-generated on first boot
#   Custom cert:  place cert.pem + key.pem in ./certs/
#   Let's Encrypt: run ./nginx/scripts/setup-letsencrypt.sh <domain> <email>
#                  then set FQDN=yourdomain.com in .env
#
# Access:  https://<HOST_IP>  (port 443)  — nginx proxies to backend + frontend
# API:     https://<HOST_IP>/api/v1/
#
# Usage:
#   cp .env.example .env && nano .env
#   docker compose -f docker-compose.prod.yml up -d
#   ./bootstrap.sh        (first boot only)
#
# Email profiles (optional — default is no email):
#   Mailpit:     docker compose -f docker-compose.prod.yml --profile mailpit up -d
#   smtp-bridge: docker compose -f docker-compose.prod.yml --profile smtp-bridge up -d
# ============================================================================

services:

  isms-core-postgres:
    image: postgres:18-alpine
    container_name: isms-core-postgres
    environment:
      POSTGRES_DB: isms_db
      POSTGRES_USER: isms_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schemas/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isms_user -d isms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - isms-core-network

  isms-core-redis:
    image: redis:8-alpine
    container_name: isms-core-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - isms-core-network

  isms-core-opensearch:
    image: opensearchproject/opensearch:3
    container_name: isms-core-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - isms-core-network

  isms-core-backend:
    build:
      context: ./backend
    image: isms-core-backend:latest
    container_name: isms-core-backend
    # Port 8000 not published externally — nginx proxies /api/
    volumes:
      - ./datasets/data:/app/datasets:ro
      - ../isms-core-framework:/app/isms-framework:ro
      - ../isms-core-operational:/app/isms-operational:ro
      - ../isms-core-privacy:/app/isms-privacy:ro
      - ../isms-core-cloud:/app/isms-cloud:ro
    environment:
      - DATABASE_URL=postgresql://isms_user:${POSTGRES_PASSWORD}@isms-core-postgres:5432/isms_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@isms-core-redis:6379/0
      - DATASETS_PATH=/app/datasets
      - FRAMEWORK_PATH=/app/isms-framework
      - OPERATIONAL_PATH=/app/isms-operational
      - PRIVACY_PATH=/app/isms-privacy
      - CLOUD_PATH=/app/isms-cloud
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=false
      - LOG_LEVEL=INFO
      - OPENSEARCH_URL=http://isms-core-opensearch:9200
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@isms-core.dev}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CONNECTORS_WORKER_SECRET=${CONNECTORS_WORKER_SECRET:-}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - PLATFORM_URL=${PLATFORM_URL}
    depends_on:
      isms-core-postgres:
        condition: service_healthy
      isms-core-redis:
        condition: service_healthy
      isms-core-opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - isms-core-network

  isms-core-beat:
    build:
      context: ./backend
    image: isms-core-beat:latest
    container_name: isms-core-beat
    command: celery -A src.worker.celery_app beat --loglevel=info
    volumes:
      - ./datasets/data:/app/datasets:ro
      - ../isms-core-framework:/app/isms-framework:ro
      - ../isms-core-operational:/app/isms-operational:ro
      - ../isms-core-privacy:/app/isms-privacy:ro
      - ../isms-core-cloud:/app/isms-cloud:ro
    environment:
      - DATABASE_URL=postgresql://isms_user:${POSTGRES_PASSWORD}@isms-core-postgres:5432/isms_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@isms-core-redis:6379/0
      - DATASETS_PATH=/app/datasets
      - OPENSEARCH_URL=http://isms-core-opensearch:9200
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - PLATFORM_URL=${PLATFORM_URL}
    healthcheck:
      disable: true
    depends_on:
      isms-core-postgres:
        condition: service_healthy
      isms-core-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - isms-core-network

  isms-core-worker:
    build:
      context: ./backend
    image: isms-core-worker:latest
    container_name: isms-core-worker
    command: celery -A src.worker.celery_app worker --loglevel=info --queues=isms
    volumes:
      - ./datasets/data:/app/datasets:ro
      - ../isms-core-framework:/app/isms-framework:ro
      - ../isms-core-operational:/app/isms-operational:ro
      - ../isms-core-privacy:/app/isms-privacy:ro
      - ../isms-core-cloud:/app/isms-cloud:ro
    environment:
      - DATABASE_URL=postgresql://isms_user:${POSTGRES_PASSWORD}@isms-core-postgres:5432/isms_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@isms-core-redis:6379/0
      - DATASETS_PATH=/app/datasets
      - OPENSEARCH_URL=http://isms-core-opensearch:9200
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - PLATFORM_URL=${PLATFORM_URL}
    depends_on:
      isms-core-postgres:
        condition: service_healthy
      isms-core-redis:
        condition: service_healthy
      isms-core-opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.worker.celery_app inspect ping --timeout 5 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - isms-core-network

  isms-core-frontend:
    build:
      context: ./frontend
    image: isms-core-frontend:latest
    container_name: isms-core-frontend
    # Port 3000 not published externally — nginx proxies /
    environment:
      - VITE_BACKEND_URL=https://${HOST_IP}
    depends_on:
      isms-core-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - isms-core-network

  # ── nginx reverse proxy + TLS (A.8.24) ────────────────────────────────────
  isms-core-nginx:
    build:
      context: ./nginx
    image: isms-core-nginx:latest
    container_name: isms-core-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs            # custom cert drop-in (cert.pem + key.pem)
      - /etc/letsencrypt:/etc/letsencrypt:ro # Let's Encrypt (read-only)
      - certbot-www:/var/www/certbot        # ACME HTTP-01 challenge
    environment:
      - NGINX_HOST=${FQDN:-${HOST_IP}}
      - FQDN=${FQDN:-}
    depends_on:
      isms-core-backend:
        condition: service_healthy
      isms-core-frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - isms-core-network

  # ── Email options (optional profiles) ─────────────────────────────────────

  # Mailpit: docker compose -f docker-compose.prod.yml --profile mailpit up -d
  # Set in .env: MAIL_HOST=isms-core-mailhog  MAIL_PORT=1025
  isms-core-mailhog:
    image: axllent/mailpit:latest
    container_name: isms-core-mailhog
    profiles: [mailpit]
    ports:
      - "8025:8025"
    environment:
      - MP_MAX_MESSAGES=500
    restart: unless-stopped
    networks:
      - isms-core-network

  # smtp-bridge: docker compose -f docker-compose.prod.yml --profile smtp-bridge up -d
  # Set in .env: MAIL_HOST=isms-core-smtp-bridge  MAIL_PORT=1025
  isms-core-smtp-bridge:
    build:
      context: ./smtp-bridge
    image: isms-core-smtp-bridge:latest
    container_name: isms-core-smtp-bridge
    profiles: [smtp-bridge]
    environment:
      - TENANT_ID=${SMTP_BRIDGE_TENANT_ID:-}
      - CLIENT_ID=${SMTP_BRIDGE_CLIENT_ID:-}
      - CLIENT_SECRET=${SMTP_BRIDGE_CLIENT_SECRET:-}
      - FROM_ADDRESS=${SMTP_BRIDGE_FROM_ADDRESS:-}
      - FROM_NAME=${SMTP_BRIDGE_FROM_NAME:-ISMS CORE}
      - SMTP_PORT=1025
      - LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - isms-core-network

networks:
  isms-core-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  opensearch-data:
    driver: local
  certbot-www:
    driver: local
